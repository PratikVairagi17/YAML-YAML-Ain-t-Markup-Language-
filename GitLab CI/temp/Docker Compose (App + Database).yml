version: "3.8"
services:
app:
build: .
container_name: backend_app
ports:
- "8000:8000"
depends_on:
- db


db:
image: postgres:15
container_name: postgres_db
environment:
POSTGRES_USER: admin
POSTGRES_PASSWORD: admin123
POSTGRES_DB: appdb
volumes:
- db_data:/var/lib/postgresql/data


volumes:
db_data: